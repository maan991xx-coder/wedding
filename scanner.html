<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ماسح رموز QR — زفاف محمود & ثويبة</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root { --green:#5c7a2c; --green-dark:#3d5219; --cream:#f7f2ea; --red:#c0392b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Amiri',serif; background:#1a1a1a; color:white; min-height:100vh; }

  .header {
    background:var(--green-dark); padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .header h1 { font-size:18px; }
  .header a { color:rgba(255,255,255,0.7); font-size:13px; text-decoration:none; }

  .scanner-wrap {
    max-width:420px; margin:0 auto; padding:20px 16px;
  }

  #reader { border-radius:16px; overflow:hidden; background:#000; }

  .result-card {
    margin-top:16px; border-radius:16px; padding:20px;
    text-align:center; transition:all 0.3s;
  }
  .result-card.success { background:#1e4d1e; border:2px solid #2ecc71; }
  .result-card.error { background:#4d1e1e; border:2px solid var(--red); }
  .result-card.duplicate { background:#4d3d1e; border:2px solid #f39c12; }
  .result-card.idle { background:#2a2a2a; border:2px dashed #555; }

  .result-icon { font-size:40px; margin-bottom:8px; }
  .result-name { font-size:24px; font-weight:700; margin-bottom:4px; }
  .result-code { font-family:monospace; font-size:16px; opacity:0.7; letter-spacing:2px; }
  .result-msg { font-size:14px; margin-top:8px; opacity:0.8; }

  .manual-check {
    margin-top:16px; background:#2a2a2a; border-radius:12px; padding:16px;
  }
  .manual-check h3 { font-size:15px; margin-bottom:12px; opacity:0.8; }
  .manual-row { display:flex; gap:8px; }
  .manual-input {
    flex:1; padding:11px 14px; background:#1a1a1a; border:1.5px solid #444;
    border-radius:8px; color:white; font-family:'Amiri',serif; font-size:15px;
    text-align:center; letter-spacing:2px; outline:none; text-transform:uppercase;
  }
  .manual-input:focus { border-color:var(--green); }
  .manual-btn {
    padding:11px 18px; background:var(--green); color:white;
    border:none; border-radius:8px; font-family:'Amiri',serif; font-size:15px;
    cursor:pointer; font-weight:700;
  }
  .manual-btn:hover { background:var(--green-dark); }

  .scan-log { margin-top:16px; background:#2a2a2a; border-radius:12px; overflow:hidden; }
  .scan-log-header { padding:12px 16px; font-size:14px; opacity:0.7; border-bottom:1px solid #333; }
  .log-item { padding:10px 16px; border-bottom:1px solid #333; display:flex; align-items:center; gap:10px; }
  .log-item:last-child { border-bottom:none; }
  .log-emoji { font-size:16px; }
  .log-info { flex:1; }
  .log-info .name { font-size:14px; }
  .log-info .time { font-size:11px; opacity:0.5; }

  .pulse { animation:pulse 0.5s ease; }
  @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }

  #camera-permission {
    text-align:center; padding:40px 20px; color:rgba(255,255,255,0.6);
  }
</style>
</head>
<body>

<div class="header">
  <h1>📷 ماسح رموز QR</h1>
  <a href="admin.html">← لوحة الإدارة</a>
</div>

<div class="scanner-wrap">

  <div id="reader"></div>

  <div class="result-card idle" id="result-card">
    <div class="result-icon" id="result-icon">📷</div>
    <div class="result-name" id="result-name">في انتظار المسح</div>
    <div class="result-code" id="result-code">وجّه الكاميرا نحو رمز QR</div>
    <div class="result-msg" id="result-msg"></div>
  </div>

  <div class="manual-check">
    <h3>🔢 إدخال الكود يدوياً</h3>
    <div class="manual-row">
      <input type="text" id="manual-code" class="manual-input" placeholder="XXXXXX" maxlength="6" oninput="this.value=this.value.toUpperCase()">
      <button class="manual-btn" onclick="manualCheckIn()">تحقق</button>
    </div>
  </div>

  <div class="scan-log">
    <div class="scan-log-header">سجل المسح الأخير</div>
    <div id="scan-log-list">
      <div class="log-item"><span style="opacity:0.5;font-size:13px;padding:4px">لا يوجد مسح بعد</span></div>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
const scanLog = [];
let scanner;

// ── Init Scanner ──
function initScanner() {
  scanner = new Html5Qrcode('reader');
  Html5Qrcode.getCameras().then(cameras => {
    if (!cameras.length) { showResult('error','❌','لا يوجد كاميرا','تعذّر الوصول إلى الكاميرا'); return; }
    // Prefer back camera
    const cam = cameras.find(c => c.label.toLowerCase().includes('back')) || cameras[cameras.length-1];
    scanner.start(
      cam.id,
      { fps:10, qrbox:{width:250,height:250} },
      onScanSuccess,
      () => {} // ignore errors
    );
  }).catch(() => showResult('error','❌','خطأ','لم يُسمح بالوصول إلى الكاميرا'));
}

// ── QR Scan Success ──
let lastScanned = '';
let scanCooldown = false;

async function onScanSuccess(decoded) {
  if (scanCooldown || decoded === lastScanned) return;
  lastScanned = decoded;
  scanCooldown = true;
  setTimeout(() => { scanCooldown = false; lastScanned = ''; }, 3000);

  // Parse: WEDDING:CODE:NAME
  const parts = decoded.split(':');
  if (parts[0] !== 'WEDDING' || parts.length < 3) {
    showResult('error','❌','رمز غير صحيح','هذا ليس رمز دعوة الزفاف');
    return;
  }
  const code = parts[1];
  const name = parts.slice(2).join(':');
  await processCheckIn(code, name);
}

// ── Process Check-in ──
async function processCheckIn(code, guestName) {
  // Show processing
  showResult('idle','⏳','جاري التحقق...','');

  try {
    if (SCRIPT_URL && SCRIPT_URL !== 'https://script.google.com/macros/s/AKfycbwruqfVglLrteTcAFQgo8ljymmUoVDV8rf5Cw4fkD_a6xhyygXOdXxuF3ALttY301bV/exec') {
      const fd = new FormData();
      fd.append('action','checkIn');
      fd.append('code', code);
      fd.append('time', new Date().toLocaleTimeString('ar-OM',{hour:'2-digit',minute:'2-digit'}));
      const res = await fetch(SCRIPT_URL,{method:'POST',body:fd});
      const data = await res.json();

      if (data.status === 'success') {
        showResult('success','✅', data.name || guestName, `كود: ${code}`);
        addToLog('✅', data.name || guestName, 'حضر');
      } else if (data.status === 'duplicate') {
        showResult('duplicate','⚠️', data.name || guestName, `سبق تسجيل دخوله — ${data.attendTime || ''}`);
        addToLog('⚠️', data.name || guestName, 'مكرر');
      } else {
        showResult('error','❌','كود غير موجود', `الكود: ${code}`);
        addToLog('❌', code, 'غير موجود');
      }
    } else {
      // Demo mode
      showResult('success','✅', guestName || 'ضيف', `كود: ${code} (وضع تجريبي)`);
      addToLog('✅', guestName||code, 'حضر');
    }
  } catch(e) {
    showResult('error','❌','خطأ في الاتصال','تحقق من الإنترنت');
  }
}

// ── Manual Code Check ──
async function manualCheckIn() {
  const code = document.getElementById('manual-code').value.trim().toUpperCase();
  if (code.length !== 6) { alert('الكود يجب أن يكون 6 أحرف/أرقام'); return; }
  document.getElementById('manual-code').value = '';
  await processCheckIn(code, '');
}

// ── Show Result ──
function showResult(type, icon, name, code, msg='') {
  const card = document.getElementById('result-card');
  card.className = `result-card ${type} pulse`;
  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-name').textContent = name;
  document.getElementById('result-code').textContent = code;
  document.getElementById('result-msg').textContent = msg;
  // Vibrate on mobile
  if (type === 'success' && navigator.vibrate) navigator.vibrate([100, 50, 100]);
  if (type === 'error' && navigator.vibrate) navigator.vibrate(500);
}

// ── Scan Log ──
function addToLog(emoji, name, status) {
  const time = new Date().toLocaleTimeString('ar-OM',{hour:'2-digit',minute:'2-digit'});
  scanLog.unshift({emoji, name, status, time});
  if (scanLog.length > 20) scanLog.pop();
  const listEl = document.getElementById('scan-log-list');
  listEl.innerHTML = scanLog.map(l => `
    <div class="log-item">
      <span class="log-emoji">${l.emoji}</span>
      <div class="log-info">
        <div class="name">${l.name}</div>
        <div class="time">${l.time} · ${l.status}</div>
      </div>
    </div>`).join('');
}

// Start
window.addEventListener('load', initScanner);
</script>
</body>
</html>
