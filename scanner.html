<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ماسح رموز QR — زفاف محمود & ثويبة</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Scheherazade+New:wght@400;700&display=swap"
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  @font-face { font-synthesis: weight; }
  * { font-synthesis: weight style; }
  :root { --green:#5c7a2c; --green-dark:#3d5219; --cream:#f7f2ea; --red:#c0392b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
  font-weight: 700; font-family:'Amiri Quran','Scheherazade New',serif;
  font-weight: 700; background:#1a1a1a; color:white; min-height:100vh; }

  .header {
    background:var(--green-dark); padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .header h1 { font-size:18px; }
  .header a { color:rgba(255,255,255,0.7); font-size:13px; text-decoration:none; }

  .scanner-wrap {
    max-width:420px; margin:0 auto; padding:20px 16px;
  }

  #reader { border-radius:16px; overflow:hidden; background:#000; }

  .result-card {
    margin-top:16px; border-radius:16px; padding:20px;
    text-align:center; transition:all 0.3s;
  }
  .result-card.success { background:#1e4d1e; border:2px solid #2ecc71; }
  .result-card.error { background:#4d1e1e; border:2px solid var(--red); }
  .result-card.duplicate { background:#4d3d1e; border:2px solid #f39c12; }
  .result-card.idle { background:#2a2a2a; border:2px dashed #555; }

  .result-icon { font-size:40px; margin-bottom:8px; }
  .result-name { font-size:24px; font-weight:700; margin-bottom:4px; }
  .result-code { font-family:monospace; font-size:16px; opacity:0.7; letter-spacing:2px; }
  .result-msg { font-size:14px; margin-top:8px; opacity:0.8; }

  .manual-check {
    margin-top:16px; background:#2a2a2a; border-radius:12px; padding:16px;
  }
  .manual-check h3 { font-size:15px; margin-bottom:12px; opacity:0.8; }
  .manual-row { display:flex; gap:8px; }
  .manual-input {
    flex:1; padding:11px 14px; background:#1a1a1a; border:1.5px solid #444;
    border-radius:8px; color:white; font-family:'Amiri Quran','Scheherazade New',serif;
  font-weight: 700; font-size:15px;
    text-align:center; letter-spacing:2px; outline:none; text-transform:uppercase;
  }
  .manual-input:focus { border-color:var(--green); }
  .manual-btn {
    padding:11px 18px; background:var(--green); color:white;
    border:none; border-radius:8px; font-family:'Amiri Quran','Scheherazade New',serif;
  font-weight: 700; font-size:15px;
    cursor:pointer; font-weight:700;
  }
  .manual-btn:hover { background:var(--green-dark); }

  .scan-log { margin-top:16px; background:#2a2a2a; border-radius:12px; overflow:hidden; }
  .scan-log-header { padding:12px 16px; font-size:14px; opacity:0.7; border-bottom:1px solid #333; }
  .log-item { padding:10px 16px; border-bottom:1px solid #333; display:flex; align-items:center; gap:10px; }
  .log-item:last-child { border-bottom:none; }
  .log-emoji { font-size:16px; }
  .log-info { flex:1; }
  .log-info .name { font-size:14px; }
  .log-info .time { font-size:11px; opacity:0.5; }

  .pulse { animation:pulse 0.5s ease; }
  @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }

  #camera-permission {
    text-align:center; padding:40px 20px; color:rgba(255,255,255,0.6);
  }
</style>
</head>
<body>

<div class="header">
  <h1>📷 ماسح رموز QR</h1>
  <a href="admin.html">← لوحة الإدارة</a>
</div>

<div class="scanner-wrap">

  <button id="start-cam-btn" onclick="startScanner()" style="width:100%;padding:16px;background:var(--green,#5c7a2c);color:white;border:none;border-radius:12px;font-family:'Amiri Quran','Amiri',serif;font-size:18px;font-weight:700;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px">
    📷 تشغيل الكاميرا والبدء بالمسح
  </button>

  <button id="stop-cam-btn" onclick="stopScanner()" style="display:none;width:100%;padding:12px;background:#c0392b;color:white;border:none;border-radius:12px;font-family:'Amiri Quran','Amiri',serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:14px">
    ⏹️ إيقاف الكاميرا
  </button>

  <div id="reader"></div>

  <div class="result-card idle" id="result-card">
    <div class="result-icon" id="result-icon">📷</div>
    <div class="result-name" id="result-name">اضغط «تشغيل الكاميرا» للبدء</div>
    <div class="result-code" id="result-code">سيطلب المتصفح إذن الكاميرا — اضغط «سماح»</div>
    <div class="result-msg" id="result-msg"></div>
  </div>

  <div class="manual-check">
    <h3>🔢 إدخال الكود يدوياً</h3>
    <div class="manual-row">
      <input type="text" id="manual-code" class="manual-input" placeholder="XXXXXX" maxlength="6" oninput="this.value=this.value.toUpperCase()">
      <button class="manual-btn" onclick="manualCheckIn()">تحقق</button>
    </div>
  </div>

  <div class="scan-log">
    <div class="scan-log-header">سجل المسح الأخير</div>
    <div id="scan-log-list">
      <div class="log-item"><span style="opacity:0.5;font-size:13px;padding:4px">لا يوجد مسح بعد</span></div>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxVt2dcNJb9tSoO0Ix2o_uk61UxAWmJMq8zEDWUggL-lCbbkW6kBPSMo2uBYP5iaEiPxg/exec';
const scanLog = [];
let scanner;

// JSONP — reliable cross-origin call (bypasses CORS)
function callScriptOnce(params, timeoutMs) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeoutMs || 30000);
    function cleanup(){ clearTimeout(timer); try{delete window[cb];}catch(e){window[cb]=undefined;} if(script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = (data) => { cleanup(); resolve(data); };
    const qs = new URLSearchParams(Object.assign({}, params, {callback:cb})).toString();
    script.src = SCRIPT_URL + '?' + qs + '&_=' + Date.now();
    script.onerror = () => { cleanup(); reject(new Error('network')); };
    document.head.appendChild(script);
  });
}
async function callScript(params, attempts) {
  attempts = attempts || 3;
  let lastErr;
  for (let i = 0; i < attempts; i++) {
    try { return await callScriptOnce(params, 30000); }
    catch (e) { lastErr = e; await new Promise(r => setTimeout(r, 1500)); }
  }
  throw lastErr;
}

// ── Start Scanner (triggered by user tap → required for camera permission) ──
async function startScanner() {
  // HTTPS check — camera only works on https or localhost
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    showResult('error','🔒','يجب فتح الموقع عبر HTTPS','الكاميرا لا تعمل إلا على رابط آمن (https) — افتح الرابط في Safari أو Chrome');
    return;
  }

  // Detect in-app browsers (Instagram/WhatsApp/etc) that block the camera
  const ua = navigator.userAgent || '';
  if (/Instagram|FBAN|FBAV|WhatsApp|Telegram|Line|Snapchat|Twitter/i.test(ua)) {
    showResult('error','🌐','افتح الرابط في المتصفح','أنت داخل تطبيق آخر يمنع الكاميرا. اضغط ⋯ ثم «فتح في Safari/Chrome»');
    return;
  }

  // Check the browser supports camera APIs at all
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showResult('error','⚠️','المتصفح لا يدعم الكاميرا','جرّب متصفح Chrome أو Safari الحديث، أو استخدم الإدخال اليدوي');
    return;
  }

  const startBtn = document.getElementById('start-cam-btn');
  const stopBtn = document.getElementById('stop-cam-btn');
  startBtn.disabled = true;
  showResult('idle','⏳','جاري تشغيل الكاميرا...','اضغط «سماح / Allow» عند ظهور طلب الإذن');

  scanner = new Html5Qrcode('reader');
  const config = { fps: 10, qrbox: { width: 250, height: 250 } };

  // Attempt 1: back camera via facingMode
  try {
    await scanner.start({ facingMode: { exact: 'environment' } }, config, onScanSuccess, () => {});
    return onCameraStarted();
  } catch (e1) {
    // Attempt 2: any environment camera (non-exact)
    try {
      await scanner.start({ facingMode: 'environment' }, config, onScanSuccess, () => {});
      return onCameraStarted();
    } catch (e2) {
      // Attempt 3: enumerate cameras and pick one
      try {
        const cams = await Html5Qrcode.getCameras();
        if (cams && cams.length) {
          const cam = cams.find(c => /back|rear|environment/i.test(c.label)) || cams[cams.length - 1];
          await scanner.start(cam.id, config, onScanSuccess, () => {});
          return onCameraStarted();
        }
        throw new Error('NotFoundError: no cameras');
      } catch (e3) {
        startBtn.disabled = false;
        showCameraError(e3 || e2 || e1);
      }
    }
  }
}

function onCameraStarted() {
  document.getElementById('start-cam-btn').style.display = 'none';
  document.getElementById('stop-cam-btn').style.display = 'block';
  showResult('idle','📷','الكاميرا جاهزة','وجّه الكاميرا نحو رمز QR الضيف');
}

function showCameraError(err) {
  const msg = (err && (err.name || err.message)) ? String(err.name || '') + ' ' + String(err.message || '') : String(err || '');
  let icon = '⚠️', title = 'تعذّر تشغيل الكاميرا', detail = 'جرّب الإدخال اليدوي للكود بالأسفل';

  if (/NotAllowedError|Permission|denied/i.test(msg)) {
    icon = '🚫'; title = 'تم رفض إذن الكاميرا';
    detail = 'Safari: إعدادات الجوال ← Safari ← الكاميرا ← سماح. Chrome: اضغط 🔒 بجوار الرابط ← الكاميرا ← سماح. ثم أعد المحاولة';
  } else if (/NotFoundError|no camera|Requested device not found/i.test(msg)) {
    icon = '❌'; title = 'لم يتم العثور على كاميرا'; detail = 'تأكد أن للجهاز كاميرا وأنها غير مستخدمة من تطبيق آخر';
  } else if (/NotReadableError|TrackStartError|in use/i.test(msg)) {
    icon = '📵'; title = 'الكاميرا مشغولة'; detail = 'أغلق أي تطبيق آخر يستخدم الكاميرا ثم أعد المحاولة';
  } else if (/OverconstrainedError/i.test(msg)) {
    icon = '🔄'; title = 'مشكلة في اختيار الكاميرا'; detail = 'أعد الضغط على الزر مرة أخرى';
  }

  // Show the real technical error too, to help diagnose
  showResult('error', icon, title, detail + '  —  (' + (msg.trim() || 'خطأ غير معروف') + ')');
}

// ── Stop Scanner ──
async function stopScanner() {
  try { if (scanner) { await scanner.stop(); scanner.clear(); } } catch(e) {}
  document.getElementById('start-cam-btn').style.display = 'block';
  document.getElementById('start-cam-btn').disabled = false;
  document.getElementById('stop-cam-btn').style.display = 'none';
  showResult('idle','📷','تم إيقاف الكاميرا','اضغط «تشغيل الكاميرا» للبدء مجدداً');
}

// ── QR Scan Success ──
let lastScanned = '';
let scanCooldown = false;

async function onScanSuccess(decoded) {
  if (scanCooldown || decoded === lastScanned) return;
  lastScanned = decoded;
  scanCooldown = true;
  setTimeout(() => { scanCooldown = false; lastScanned = ''; }, 3000);

  // Parse: WEDDING:CODE:NAME
  const parts = decoded.split(':');
  if (parts[0] !== 'WEDDING' || parts.length < 3) {
    showResult('error','❌','رمز غير صحيح','هذا ليس رمز دعوة الزفاف');
    return;
  }
  const code = parts[1];
  const name = parts.slice(2).join(':');
  await processCheckIn(code, name);
}

// ── Process Check-in ──
async function processCheckIn(code, guestName) {
  showResult('idle','⏳','جاري التحقق...','');
  const t = new Date().toLocaleTimeString('ar-OM',{hour:'2-digit',minute:'2-digit'});
  try {
    const data = await callScript({ action:'checkin', code:code, time:t });
    if (data.status === 'success') {
      showResult('success','✅', data.name || guestName || code, 'كود: ' + code);
      addToLog('✅', data.name || guestName || code, 'حضر');
    } else if (data.status === 'duplicate') {
      showResult('duplicate','⚠️', data.name || guestName || code, 'سبق تسجيل دخوله — ' + (data.attendTime || ''));
      addToLog('⚠️', data.name || guestName || code, 'مكرر');
    } else {
      showResult('error','❌','كود غير موجود', 'الكود: ' + code);
      addToLog('❌', code, 'غير موجود');
    }
  } catch(e) {
    showResult('error','❌','خطأ في الاتصال','تحقق من الإنترنت');
  }
}

// ── Manual Code Check ──
async function manualCheckIn() {
  const code = document.getElementById('manual-code').value.trim().toUpperCase();
  if (code.length !== 6) { alert('الكود يجب أن يكون 6 أحرف/أرقام'); return; }
  document.getElementById('manual-code').value = '';
  await processCheckIn(code, '');
}

// ── Show Result ──
function showResult(type, icon, name, code, msg='') {
  const card = document.getElementById('result-card');
  card.className = `result-card ${type} pulse`;
  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-name').textContent = name;
  document.getElementById('result-code').textContent = code;
  document.getElementById('result-msg').textContent = msg;
  // Vibrate on mobile
  if (type === 'success' && navigator.vibrate) navigator.vibrate([100, 50, 100]);
  if (type === 'error' && navigator.vibrate) navigator.vibrate(500);
}

// ── Scan Log ──
function addToLog(emoji, name, status) {
  const time = new Date().toLocaleTimeString('ar-OM',{hour:'2-digit',minute:'2-digit'});
  scanLog.unshift({emoji, name, status, time});
  if (scanLog.length > 20) scanLog.pop();
  const listEl = document.getElementById('scan-log-list');
  listEl.innerHTML = scanLog.map(l => `
    <div class="log-item">
      <span class="log-emoji">${l.emoji}</span>
      <div class="log-info">
        <div class="name">${l.name}</div>
        <div class="time">${l.time} · ${l.status}</div>
      </div>
    </div>`).join('');
}

// لا نشغّل الكاميرا تلقائياً — يجب نقرة المستخدم لطلب الإذن
// المستخدم يضغط زر «تشغيل الكاميرا»
</script>
</body>
</html>
